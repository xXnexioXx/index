<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark">
  <title>nexio.network - Tools</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* shared card */
    .tool-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 40px;
    }

    .tool-card h2 {
      font-size: 1.5rem;
      font-weight: 400;
      text-align: center;
      letter-spacing: 1px;
      margin: 0 0 30px;
    }

    /* compendium tabs */
    .cat-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .cat-tab {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #888;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .cat-tab:hover { background: rgba(255,255,255,0.1); color: #e0e0e0; }
    .cat-tab.active { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.3); }

    /* sub-filter */
    .sub-filter {
      display: none;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
    }
    .sub-filter.visible { display: flex; }
    .sub-filter label { font-size: 13px; color: #888; }

    .sub-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #888;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .sub-btn:hover { background: rgba(255,255,255,0.1); color: #e0e0e0; }
    .sub-btn.active { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.3); }

    /* category panels */
    .cat-panel { display: none; }
    .cat-panel.active { display: block; }

    /* button grid */
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }

    .tool-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #e0e0e0;
      padding: 14px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .tool-btn:hover { background: rgba(255,255,255,0.1); border-color: #0af; transform: translateY(-2px); }
    .tool-btn.de::after { content: ' [DE]'; font-size: 10px; color: #888; }
    .tool-btn.en::after { content: ' [EN]'; font-size: 10px; color: #888; }

    /* bookmarks accordion */
    .bm-cat {
      margin-bottom: 8px;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      overflow: hidden;
    }

    .bm-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 18px;
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    .bm-head:hover { background: rgba(255,255,255,0.08); }
    .bm-head span { font-size: 14px; font-weight: 500; color: #e0e0e0; }

    .bm-meta { display: flex; align-items: center; gap: 10px; }
    .bm-count { font-size: 11px; color: #555; background: rgba(255,255,255,0.05); padding: 2px 7px; border-radius: 10px; }
    .bm-arrow { color: #555; font-size: 11px; transition: transform 0.2s; }
    .bm-cat.open .bm-arrow { transform: rotate(180deg); }

    .bm-links {
      display: none;
      padding: 12px 14px;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 8px;
      background: rgba(0,0,0,0.15);
    }
    .bm-cat.open .bm-links { display: grid; }

    .bm-link {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      color: #c8c8c8;
      padding: 10px 13px;
      border-radius: 6px;
      font-size: 13px;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      transition: all 0.18s;
    }
    .bm-link:hover { background: rgba(255,255,255,0.09); border-color: #0af; color: #fff; transform: translateY(-1px); }

    /* loading / error */
    .bm-loading { text-align: center; padding: 40px 20px; color: #555; font-size: 14px; }
    .bm-spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.08); border-top-color: #0af;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .bm-error {
      text-align: center; padding: 30px 20px; color: #e05555; font-size: 13px;
      background: rgba(224,85,85,0.05); border: 1px solid rgba(224,85,85,0.15); border-radius: 8px;
    }
    .bm-error a { color: #0af; }

    @media (max-width: 600px) {
      .tool-card { padding: 15px; }
      .btn-grid { grid-template-columns: repeat(2,1fr); gap: 8px; }
      .cat-tabs { gap: 6px; }
      .cat-tab { padding: 6px 10px; font-size: 11px; }
      .tool-btn { padding: 10px 12px; font-size: 12px; }
      .bm-links { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>

  <script>
    // ── Menu ──────────────────────────────────────────────────────────────────
    const menuBtn = document.getElementById('menuBtn');
    const menu = document.getElementById('menu');
    const closeMenu = () => { menu.classList.remove('active'); menuBtn.classList.remove('active'); menu.setAttribute('aria-hidden','true'); };
    menuBtn.addEventListener('click', e => { e.stopPropagation(); menu.classList.toggle('active'); menuBtn.classList.toggle('active'); menu.setAttribute('aria-hidden', menu.classList.contains('active') ? 'false' : 'true'); });
    document.addEventListener('click', e => { if (!menu.contains(e.target) && e.target !== menuBtn) closeMenu(); });
    document.querySelectorAll('.menu a').forEach(l => l.addEventListener('click', closeMenu));

    // ── Compendium ────────────────────────────────────────────────────────────
    const subFilter = document.getElementById('subFilter');
    const subLabel  = document.getElementById('subLabel');
    const subBtns   = document.querySelectorAll('.sub-btn');

    const subConfig = {
      movies: { label: 'Language:', subs: ['all','de','en'] },
      games:  { label: 'Platform:', subs: ['all','pc','roms'] }
    };

    document.querySelectorAll('.cat-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.cat-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.querySelector(`.cat-panel[data-cat="${tab.dataset.cat}"]`).classList.add('active');

        subBtns.forEach(b => b.style.display = 'none');
        const cfg = subConfig[tab.dataset.cat];
        if (cfg) {
          subLabel.textContent = cfg.label;
          cfg.subs.forEach(s => document.querySelector(`.sub-btn[data-sub="${s}"]`).style.display = 'inline-block');
          subBtns.forEach(b => b.classList.remove('active'));
          document.querySelector('.sub-btn[data-sub="all"]').classList.add('active');
          document.querySelectorAll('.cat-panel.active .tool-btn').forEach(el => el.style.display = 'block');
          subFilter.classList.add('visible');
        } else {
          subFilter.classList.remove('visible');
        }
      });
    });

    subBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        subBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const sub = btn.dataset.sub;
        document.querySelectorAll('.cat-panel.active .tool-btn').forEach(el => {
          el.style.display = (sub === 'all' || el.dataset.sub === sub) ? 'block' : 'none';
        });
      });
    });

    // ── Bookmarks ─────────────────────────────────────────────────────────────
    function parseBookmarks(html) {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      let toolbarDL = null;
      for (const h3 of doc.querySelectorAll('H3')) {
        if (h3.getAttribute('PERSONAL_TOOLBAR_FOLDER') === 'true') {
          let s = h3.nextElementSibling;
          while (s && s.tagName !== 'DL') s = s.nextElementSibling;
          toolbarDL = s; break;
        }
      }
      if (!toolbarDL) toolbarDL = doc.querySelector('DL');
      if (!toolbarDL) return [];

      return Array.from(toolbarDL.children)
        .filter(el => el.tagName === 'DT' && el.querySelector(':scope > H3'))
        .map(dt => {
          const name  = dt.querySelector(':scope > H3').textContent.trim();
          const links = Array.from(dt.querySelectorAll('A')).reduce((acc, a) => {
            const href = (a.getAttribute('HREF') || '').trim();
            if (!href.startsWith('http')) return acc;
            let host; try { host = new URL(href).hostname; } catch { return acc; }
            if (!host || host === '.') return acc;
            let title = a.textContent.trim();
            if (title.length > 50) title = host.replace(/^www\./, '');
            acc.push({ title, href });
            return acc;
          }, []);
          return { name, links };
        })
        .filter(cat => cat.links.length > 0);
    }

    function renderBookmarks(cats) {
      document.getElementById('bm-list').innerHTML = cats.map(cat => `
        <div class="bm-cat">
          <div class="bm-head" onclick="this.parentElement.classList.toggle('open')">
            <span>${cat.name}</span>
            <div class="bm-meta">
              <span class="bm-count">${cat.links.length}</span>
              <span class="bm-arrow">&#9660;</span>
            </div>
          </div>
          <div class="bm-links">
            ${cat.links.map(l => `<a class="bm-link" href="${l.href}" target="_blank" rel="noopener" title="${l.href}">${l.title}</a>`).join('')}
          </div>
        </div>`).join('');
    }

    async function loadBookmarks() {
      const URL = 'https://raw.githubusercontent.com/xXnexioXx/index/main/bookmarks_clean.html';
      try {
        const res = await fetch(URL + '?cb=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const cats = parseBookmarks(await res.text());
        if (!cats.length) throw new Error('No categories found.');
        renderBookmarks(cats);
      } catch (e) {
        document.getElementById('bm-list').innerHTML =
          `<div class="bm-error">Failed to load bookmarks. <small>${e.message}</small><br><br><a href="${URL}" target="_blank">Open on GitHub</a></div>`;
      }
    }

    loadBookmarks();
  </script>
