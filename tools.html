      letter-spacing: 1px;
    }

    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .category-tab {

      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #888;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      font-family: inherit;
    }

    .category-tab:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
    }

    .category-tab.active {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.3);
    }

    .language-filter {
      display: none;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
    }

    .language-filter.visible {
      display: flex;
    }

    .language-filter label {
      font-size: 13px;
      color: #888;
      margin-right: 5px;
    }

    .lang-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #888;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
      font-family: inherit;
    }

    .lang-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
    }

    .lang-btn.active {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.3);
    }

    .category-content {
      display: none;
    }

    .category-content.active {
      display: block;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }

    .tool-button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e0e0e0;
      padding: 14px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      font-family: inherit;
    }

    .tool-button:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: #0af;
      transform: translateY(-2px);
    }

    .tool-button.de::after {
      content: ' [DE]';
      font-size: 10px;
      color: #888;
    }

    .tool-button.en::after {
      content: ' [EN]';
      font-size: 10px;
      color: #888;
    }

    @media (max-width: 600px) {
      .kompendium-container {
        padding: 15px;
      }

      .button-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .category-tabs {

      }

      }

      .language-filter {

        gap: 6px;
      }

        text-align: center;
        margin-right: 0;
        margin-bottom: 5px;
      }

        font-size: 11px;

  <script>
    // ── Menu ──────────────────────────────────────────────────────────────────
    const menuBtn = document.getElementById('menuBtn');
    const menu = document.getElementById('menu');

    function closeMenu() {
      menuBtn.setAttribute('aria-expanded', 'false');
      menu.setAttribute('aria-hidden', 'true');
      menu.classList.remove('active');
      menuBtn.classList.remove('active');
    }

    function openMenu() {
      menuBtn.setAttribute('aria-expanded', 'true');
      menu.setAttribute('aria-hidden', 'false');
      menu.classList.add('active');
      menuBtn.classList.add('active');
    }

    function toggleMenu() {
      const isExpanded = menuBtn.getAttribute('aria-expanded') === 'true';
      if (isExpanded) { closeMenu(); } else { openMenu(); }
    }

    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleMenu();
    });

    document.addEventListener('click', (e) => {
      if (!menu.contains(e.target) && e.target !== menuBtn) {
        closeMenu();
      }
    });

    document.querySelectorAll('.menu a').forEach(link => {
      link.addEventListener('click', closeMenu);
    });

    // ── Compendium ────────────────────────────────────────────────────────────
    const categoryTabs     = document.querySelectorAll('.category-tab');
    const categoryContents = document.querySelectorAll('.category-content');
    const languageFilter   = document.getElementById('languageFilter');
    const filterLabel      = document.getElementById('filterLabel');
    const langBtns         = document.querySelectorAll('.lang-btn');

    const filterConfig = {
      movies: { label: 'Language:', btns: ['all', 'de', 'en'] },
      games:  { label: 'Platform:', btns: ['all', 'pc', 'roms'] }
    };

    categoryTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const category = tab.dataset.category;

        // Switch active tab
        categoryTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        // Switch active content
        categoryContents.forEach(content => {
          content.classList.remove('active');
          if (content.dataset.category === category) {
            content.classList.add('active');
          }
        });

        // Reset all buttons to hidden, then show relevant ones
        langBtns.forEach(b => b.style.display = 'none');

        if (filterConfig[category]) {
          const cfg = filterConfig[category];
          filterLabel.textContent = cfg.label;
          cfg.btns.forEach(l => {
            document.querySelector(`.lang-btn[data-lang="${l}"]`).style.display = 'inline-block';
          });
          // Reset filter to "All"
          langBtns.forEach(b => b.classList.remove('active'));
          document.querySelector('.lang-btn[data-lang="all"]').classList.add('active');
          // Show all buttons in this category
          document.querySelectorAll('.category-content.active .tool-button').forEach(el => {
            el.style.display = 'block';
          });
          languageFilter.classList.add('visible');
        } else {
          languageFilter.classList.remove('visible');
        }
      });
    });

    langBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const lang = btn.dataset.lang;

        langBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        document.querySelectorAll('.category-content.active .tool-button').forEach(el => {
          if (lang === 'all' || el.dataset.lang === lang) {
            el.style.display = 'block';
          } else {
            el.style.display = 'none';
          }
        });
      });
    });
  </script>
