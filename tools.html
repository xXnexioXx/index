    /* ── Compendium ──────────────────────────────────────────────────────── */
    .kompendium-container {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 40px;
    }

    .kompendium-title {
      font-size: 1.5rem;
      font-weight: 400;
      margin: 0 0 30px 0;
      text-align: center;
      letter-spacing: 1px;
    }

    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .category-tab {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #888;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      font-family: inherit;
    }

    .category-tab:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
    }

    .category-tab.active {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.3);
    }

    .language-filter {
      display: none;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
    }

    .language-filter.visible {
      display: flex;
    }

    .language-filter label {
      font-size: 13px;
      color: #888;
      margin-right: 5px;
    }

    .lang-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #888;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
      font-family: inherit;
    }

    .lang-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
    }

    .lang-btn.active {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.3);
    }

    .category-content {
      display: none;
    }

    .category-content.active {
      display: block;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }

    .tool-button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e0e0e0;
      padding: 14px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      font-family: inherit;
    }

    .tool-button:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: #0af;
      transform: translateY(-2px);
    }

    .tool-button.de::after {
      content: ' [DE]';
      font-size: 10px;
      color: #888;
    }

    .tool-button.en::after {
      content: ' [EN]';
      font-size: 10px;
      color: #888;
    }

    /* ── Bookmarks ───────────────────────────────────────────────────────── */
    .bookmarks-container {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 40px;
    }

      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 30px;
      position: relative;
    }

    .bookmarks-title {
      font-size: 1.5rem;
      font-weight: 400;
      margin: 0;
      letter-spacing: 1px;
    }

      color: #888;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;

      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;

      color: #e0e0e0;
      border-color: rgba(255, 255, 255, 0.25);
      text-decoration: none;

    }

    .bookmark-btn {

  <script>
    // ── Menu ──────────────────────────────────────────────────────────────────
    const menuBtn = document.getElementById('menuBtn');
    const menu    = document.getElementById('menu');

    function closeMenu() {
      menuBtn.setAttribute('aria-expanded', 'false');
      menu.setAttribute('aria-hidden', 'true');
      menu.classList.remove('active');
      menuBtn.classList.remove('active');
    }
    function openMenu() {
      menuBtn.setAttribute('aria-expanded', 'true');
      menu.setAttribute('aria-hidden', 'false');
      menu.classList.add('active');
      menuBtn.classList.add('active');
    }
    menuBtn.addEventListener('click', e => { e.stopPropagation(); (menuBtn.getAttribute('aria-expanded') === 'true') ? closeMenu() : openMenu(); });
    document.addEventListener('click', e => { if (!menu.contains(e.target) && e.target !== menuBtn) closeMenu(); });
    document.querySelectorAll('.menu a').forEach(l => l.addEventListener('click', closeMenu));

    // ── Compendium ────────────────────────────────────────────────────────────
    const categoryTabs     = document.querySelectorAll('.category-tab');
    const categoryContents = document.querySelectorAll('.category-content');
    const languageFilter   = document.getElementById('languageFilter');
    const filterLabel      = document.getElementById('filterLabel');
    const langBtns         = document.querySelectorAll('.lang-btn');

    const filterConfig = {
      movies: { label: 'Language:', btns: ['all', 'de', 'en'] },
      games:  { label: 'Platform:', btns: ['all', 'pc', 'roms'] }
    };

    categoryTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const category = tab.dataset.category;
        categoryTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        categoryContents.forEach(c => { c.classList.remove('active'); if (c.dataset.category === category) c.classList.add('active'); });
        langBtns.forEach(b => b.style.display = 'none');
        if (filterConfig[category]) {
          const cfg = filterConfig[category];
          filterLabel.textContent = cfg.label;
          cfg.btns.forEach(l => document.querySelector(`.lang-btn[data-lang="${l}"]`).style.display = 'inline-block');
          langBtns.forEach(b => b.classList.remove('active'));
          document.querySelector('.lang-btn[data-lang="all"]').classList.add('active');
          document.querySelectorAll('.category-content.active .tool-button').forEach(el => el.style.display = 'block');
          languageFilter.classList.add('visible');
        } else {
          languageFilter.classList.remove('visible');
        }
      });
    });

    langBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const lang = btn.dataset.lang;
        langBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.category-content.active .tool-button').forEach(el => {
          el.style.display = (lang === 'all' || el.dataset.lang === lang) ? 'block' : 'none';
        });
      });
    });

    // ── Bookmarks ─────────────────────────────────────────────────────────────
    const BOOKMARKS_URL = 'https://raw.githubusercontent.com/xXnexioXx/index/main/bookmarks.html';

    async function loadBookmarks() {
      const tabsEl    = document.getElementById('bmTabs');
      const contentsEl = document.getElementById('bmContents');

      try {
        const res  = await fetch(BOOKMARKS_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const html = await res.text();

        const parser = new DOMParser();
        const doc    = parser.parseFromString(html, 'text/html');
        const links  = Array.from(doc.querySelectorAll('a[href][data-category]'));

        if (!links.length) throw new Error('No bookmarks found');

        // Group by category
        const categories = {};
        links.forEach(a => {
          const cat = a.dataset.category || 'Other';
          if (!categories[cat]) categories[cat] = [];
          categories[cat].push({ href: a.href, label: a.textContent.trim() });
        });

        const catNames = Object.keys(categories);

        // Build tabs
        tabsEl.innerHTML = catNames.map((cat, i) =>
          `<button class="bm-tab${i === 0 ? ' active' : ''}" data-bmcat="${cat}">${cat}</button>`
        ).join('');

        // Build content panels
        contentsEl.innerHTML = catNames.map((cat, i) => `
          <div class="bm-content${i === 0 ? ' active' : ''}" data-bmcat="${cat}">
            <div class="bookmarks-grid">
              ${categories[cat].map(bm => {
                const domain = new URL(bm.href).hostname;
                return `
                  <button class="bookmark-btn" onclick="window.open('${bm.href}', '_blank')" title="${bm.href}">
                    <img
                      class="bm-favicon"
                      src="https://www.google.com/s2/favicons?domain=${domain}&sz=32"
                      alt=""
                      onerror="this.style.display='none'"
                    />
                    ${bm.label}
                  </button>`;
              }).join('')}
            </div>
          </div>
        `).join('');

        // Tab switching
        tabsEl.querySelectorAll('.bm-tab').forEach(tab => {
          tab.addEventListener('click', () => {
            tabsEl.querySelectorAll('.bm-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            contentsEl.querySelectorAll('.bm-content').forEach(c => {
              c.classList.toggle('active', c.dataset.bmcat === tab.dataset.bmcat);
            });
          });
        });

      } catch (err) {
        contentsEl.innerHTML = `<div class="bookmarks-error">Could not load bookmarks. (${err.message})</div>`;
      }
    }

    loadBookmarks();
  </script>

  <script src="background.js"></script>
</body>
</html>
