<style>
  /* ── Compendium container ── */
  .kompendium-container {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 30px;
    margin-bottom: 40px;
  }

  .kompendium-title {
    font-size: 1.5rem;
    font-weight: 400;
    margin: 0 0 30px 0;
    text-align: center;
    letter-spacing: 1px;
  }

  /* ── Category tabs ── */
  .category-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 25px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  .category-tab {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: #888;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    font-family: inherit;
  }

  .category-tab:hover { background: rgba(255, 255, 255, 0.1); color: #e0e0e0; }

  .category-tab.active {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
    border-color: rgba(255, 255, 255, 0.3);
  }

  /* ── Language / platform filter ── */
  .language-filter {
    display: none;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    padding: 12px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
  }

  .language-filter.visible { display: flex; }

  .language-filter label { font-size: 13px; color: #888; margin-right: 5px; }

  .lang-btn {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: #888;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
    font-family: inherit;
  }

  .lang-btn:hover { background: rgba(255, 255, 255, 0.1); color: #e0e0e0; }
  .lang-btn.active { background: rgba(255, 255, 255, 0.15); color: #fff; border-color: rgba(255, 255, 255, 0.3); }

  /* ── Category content panels ── */
  .category-content { display: none; }
  .category-content.active { display: block; }

  /* ── Button grid ── */
  .button-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }

  .tool-button {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: #e0e0e0;
    padding: 14px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    font-family: inherit;
    text-align: center;
  }

  .tool-button:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: #0af;
    transform: translateY(-2px);
  }

  .tool-button.de::after { content: ' [DE]'; font-size: 10px; color: #888; }
  .tool-button.en::after { content: ' [EN]'; font-size: 10px; color: #888; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .kompendium-container { padding: 15px; }
    .button-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .category-tabs { gap: 6px; }
    .category-tab { padding: 6px 10px; font-size: 11px; }
    .language-filter { padding: 10px; gap: 6px; }
    .language-filter label { width: 100%; text-align: center; margin-right: 0; margin-bottom: 5px; }
    .lang-btn { padding: 6px 10px; font-size: 11px; }
    .tool-button { padding: 10px 12px; font-size: 12px; }
  }
</style>

<script>
(function () {
  const tabs     = document.querySelectorAll('.category-tab');
  const contents = document.querySelectorAll('.category-content');
  const filter   = document.getElementById('languageFilter');
  const filterLbl= document.getElementById('filterLabel');
  const langBtns = document.querySelectorAll('.lang-btn');

  const filterConfig = {
    movies: { label: 'Language:', btns: ['all', 'de', 'en'] },
    games:  { label: 'Platform:', btns: ['all', 'pc', 'roms'] }
  };

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const cat = tab.dataset.category;

      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');

      contents.forEach(c => {
        c.classList.toggle('active', c.dataset.category === cat);
      });

      langBtns.forEach(b => b.style.display = 'none');

      if (filterConfig[cat]) {
        const cfg = filterConfig[cat];
        filterLbl.textContent = cfg.label;
        cfg.btns.forEach(l => {
          document.querySelector(`.lang-btn[data-lang="${l}"]`).style.display = 'inline-block';
        });
        langBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('.lang-btn[data-lang="all"]').classList.add('active');
        document.querySelectorAll('.category-content.active .tool-button')
          .forEach(el => el.style.display = '');
        filter.classList.add('visible');
      } else {
        filter.classList.remove('visible');
      }
    });
  });

  langBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const lang = btn.dataset.lang;
      langBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.category-content.active .tool-button').forEach(el => {
        el.style.display = (lang === 'all' || el.dataset.lang === lang) ? '' : 'none';
      });
    });
  });
})();
</script>
